# Coturn TURN server configuration for Interstellar Voice Server
# https://github.com/coturn/coturn

# Listening ports
listening-port=3478
tls-listening-port=5349

# Relay ports range (make sure these are exposed in docker-compose / firewall)
min-port=49152
max-port=49252

# Use fingerprint in TURN messages
fingerprint

# Long-term credential mechanism
lt-cred-mech

# Realm (arbitrary identifier for your server)
realm=interstellar

# Default user credentials
# IMPORTANT: Change these in production!
# Syntax: username:password
user=interstellar:changeme

# Logging
verbose

# Disable weak protocols
no-loopback-peers
no-multicast-peers
