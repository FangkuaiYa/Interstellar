services:
  # ── Coturn TURN / STUN server ────────────────────────────────────
  coturn:
    image: coturn/coturn:latest
    ports:
      - "3478:3478"          # STUN / TURN
      - "3478:3478/udp"
      - "5349:5349"          # TURN TLS
      - "5349:5349/udp"
      - "49152-49252:49152-49252/udp"  # TURN relay ports
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
    restart: unless-stopped
    network_mode: host  # Coturn needs to see real client IPs for relay

  # ── Interstellar Voice Server ────────────────────────────────────
  interstellar-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "22021:22021"        # WebSocket for voice chat
    environment:
      - COTURN_URL=${COTURN_URL:-turn:your-server.com:3478}
      - COTURN_USER=${COTURN_USER:-interstellar}
      - COTURN_PASS=${COTURN_PASS:-changeme}
    restart: unless-stopped
    command:
      - "0.0.0.0:22021"
      - "--coturn"
      - "${COTURN_URL:-turn:your-server.com:3478}"
      - "--coturn-user"
      - "${COTURN_USER:-interstellar}"
      - "--coturn-pass"
      - "${COTURN_PASS:-changeme}"
